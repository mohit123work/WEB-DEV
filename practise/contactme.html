<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <!--google font, preconnect tag provided by website do not write manually-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!--my css-->
    <link rel="stylesheet" href="contactme.css">
</head>
<body>
    <div class="container">
        <h1>Contact Me</h1>
        <form class="contact">
            <input type="text" class="field" placeholder="Name">
            <input type="email" class="field" placeholder="Mail">
            <textarea name="" id="" class="field" placeholder="Message" rows="4"></textarea>
        </form>
        <button type="submit">Submit</button>
    </div>
</body>
</html>
